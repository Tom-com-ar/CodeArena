<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <title>CodeArena</title>
</head>

<body>
    <header class="bg-gray-900 text-white shadow-md">
        <nav class="container mx-auto flex items-center justify-between p-4">
            <div class="text-2xl font-bold">CodeArena</div>
            <div class="hidden md:flex gap-6 items-center" id="nav-links">
                <a href="#torneos" class="hover:text-yellow-400 transition">Torneos</a>
                <a href="pages/login.html" class="hover:text-yellow-400 transition">Login</a>
                <a href="pages/resgister.html" class="hover:text-yellow-400 transition">Registro</a>
            </div>
            <button id="menu-btn" class="md:hidden focus:outline-none">
                <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path>
                </svg>
            </button>
        </nav>
        <div id="mobile-menu" class="md:hidden hidden bg-gray-800 px-4 pb-4">
            <a href="#torneos" class="block py-2 text-white hover:text-yellow-400">Torneos</a>
            <a href="pages/login.html" class="block py-2 text-white hover:text-yellow-400">Login</a>
            <a href="pages/resgister.html" class="block py-2 text-white hover:text-yellow-400">Registro</a>
        </div>
    </header>
    <main class="bg-gray-100 min-h-screen">
        <section class="flex flex-col items-center justify-center text-center py-16 px-4 bg-amber-700">
            <h1 class="text-4xl md:text-6xl font-extrabold text-white mb-4 drop-shadow-lg">¡Bienvenido a CodeArena!</h1>
            <p class="text-lg md:text-2xl text-white mb-8 max-w-2xl">Compite en torneos de programación, mejora tus habilidades y escala en el ranking. ¡Inscríbete y demuestra tu talento!</p>
            <div class="flex flex-col md:flex-row gap-4 justify-center" id="hero-buttons">
                <a href="#torneos" class="bg-white text-yellow-500 font-bold px-8 py-3 rounded-full shadow hover:bg-yellow-400 hover:text-white transition">Ver Torneos</a>
                <a href="pages/login.html" class="bg-gray-900 text-white font-bold px-8 py-3 rounded-full shadow hover:bg-gray-700 transition">Login</a>
                <a href="pages/resgister.html" class="bg-yellow-500 text-white font-bold px-8 py-3 rounded-full shadow hover:bg-yellow-600 transition">Registro</a>
            </div>
        </section>
        <section id="torneos" class="container mx-auto py-16 px-4">
            <h2 class="text-3xl font-bold text-center mb-10 text-gray-800">Próximos Torneos</h2>
            <div class="grid gap-8 md:grid-cols-2 lg:grid-cols-3" id="torneoCards"></div>
        </section>
    </main>
    <footer class="bg-gray-900 text-white text-center py-6 mt-8">
        <p>&copy; 2026 CodeArena. Todos los derechos reservados.</p>
    </footer>
    <script>
        const currentUserKey = 'codearena_current_user';
        const tournamentsKey = 'codearena_torneos';
        const menuBtn = document.getElementById('menu-btn');
        const mobileMenu = document.getElementById('mobile-menu');

        function getCurrentUser() {
            return JSON.parse(localStorage.getItem(currentUserKey) || 'null');
        }

        function getTournaments() {
            return JSON.parse(localStorage.getItem(tournamentsKey) || '[]');
        }

        function logout() {
            localStorage.removeItem(currentUserKey);
            window.location.href = 'index.html';
        }

        function renderNavigation() {
            const user = getCurrentUser();
            const navLinks = document.getElementById('nav-links');
            const mobileLinks = document.getElementById('mobile-menu');

            if (user) {
                const dashboardLink = user.role === 'admin' ? 'pages/admin.html' : 'pages/dashboard.html';
                const dashboardText = user.role === 'admin' ? 'Panel admin' : 'Dashboard';

                navLinks.innerHTML = `
                    <a href="#torneos" class="hover:text-yellow-400 transition">Torneos</a>
                    <a href="${dashboardLink}" class="hover:text-yellow-400 transition">${dashboardText}</a>
                    <button id="logoutBtn" class="text-yellow-500 font-semibold hover:text-yellow-400 transition">Cerrar sesión</button>
                `;

                mobileLinks.innerHTML = `
                    <a href="#torneos" class="block py-2 text-white hover:text-yellow-400">Torneos</a>
                    <a href="${dashboardLink}" class="block py-2 text-white hover:text-yellow-400">${dashboardText}</a>
                    <button id="logoutBtnMobile" class="w-full text-left py-2 text-white hover:text-yellow-400">Cerrar sesión</button>
                `;

                document.getElementById('logoutBtn').addEventListener('click', logout);
                document.getElementById('logoutBtnMobile').addEventListener('click', logout);
            } else {
                navLinks.innerHTML = `
                    <a href="#torneos" class="hover:text-yellow-400 transition">Torneos</a>
                    <a href="pages/login.html" class="hover:text-yellow-400 transition">Login</a>
                    <a href="pages/resgister.html" class="hover:text-yellow-400 transition">Registro</a>
                `;

                mobileLinks.innerHTML = `
                    <a href="#torneos" class="block py-2 text-white hover:text-yellow-400">Torneos</a>
                    <a href="pages/login.html" class="block py-2 text-white hover:text-yellow-400">Login</a>
                    <a href="pages/resgister.html" class="block py-2 text-white hover:text-yellow-400">Registro</a>
                `;
            }
        }

        function renderHeroButtons() {
            const user = getCurrentUser();
            const heroButtons = document.getElementById('hero-buttons');

            if (user) {
                const dashboardLink = user.role === 'admin' ? 'pages/admin.html' : 'pages/dashboard.html';
                const dashboardText = user.role === 'admin' ? 'Ir al Panel admin' : 'Ir al Dashboard';
                heroButtons.innerHTML = `
                    <a href="#torneos" class="bg-white text-yellow-500 font-bold px-8 py-3 rounded-full shadow hover:bg-yellow-400 hover:text-white transition">Ver Torneos</a>
                    <a href="${dashboardLink}" class="bg-gray-900 text-white font-bold px-8 py-3 rounded-full shadow hover:bg-gray-700 transition">${dashboardText}</a>
                    <button id="heroLogout" class="bg-yellow-500 text-white font-bold px-8 py-3 rounded-full shadow hover:bg-yellow-600 transition">Cerrar sesión</button>
                `;
                document.getElementById('heroLogout').addEventListener('click', logout);
            } else {
                heroButtons.innerHTML = `
                    <a href="#torneos" class="bg-white text-yellow-500 font-bold px-8 py-3 rounded-full shadow hover:bg-yellow-400 hover:text-white transition">Ver Torneos</a>
                    <a href="pages/login.html" class="bg-gray-900 text-white font-bold px-8 py-3 rounded-full shadow hover:bg-gray-700 transition">Login</a>
                    <a href="pages/resgister.html" class="bg-yellow-500 text-white font-bold px-8 py-3 rounded-full shadow hover:bg-yellow-600 transition">Registro</a>
                `;
            }
        }

        function renderTournaments() {
            const cards = document.getElementById('torneoCards');
            const tournaments = getTournaments();
            if (tournaments.length === 0) {
                cards.innerHTML = `<div class="col-span-full bg-white rounded-xl shadow-lg p-6 text-center text-gray-700">No hay torneos disponibles aún. El administrador puede crear nuevos torneos en el panel de administrador.</div>`;
                return;
            }

            cards.innerHTML = tournaments.map(tournament => `
                <div class="bg-white rounded-xl shadow-lg p-6 flex flex-col">
                    <h3 class="text-xl font-bold mb-2 text-gray-900">${tournament.nombre}</h3>
                    <p class="text-gray-600 mb-4">${tournament.descripcion}</p>
                    <p class="text-gray-500 mb-2"><strong>Inicio:</strong> ${tournament.fecha_inicio}</p>
                    <p class="text-gray-500 mb-4"><strong>Fin:</strong> ${tournament.fecha_fin}</p>
                    <span class="self-start rounded-full px-3 py-1 text-sm font-semibold ${tournament.activo ? 'bg-green-100 text-green-700' : 'bg-red-100 text-red-700'}">${tournament.activo ? 'Activo' : 'Inactivo'}</span>
                </div>
            `).join('');
        }

        menuBtn.addEventListener('click', () => {
            mobileMenu.classList.toggle('hidden');
        });

        renderNavigation();
        renderHeroButtons();
        renderTournaments();
    </script>
</body>

</html>
