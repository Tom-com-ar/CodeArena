<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <title>CodeArena - Registro</title>
</head>

<body>
    <header class="bg-gray-900 text-white shadow-md">
        <nav class="container mx-auto flex items-center justify-between p-4">
            <a href="../index.html" class="text-2xl font-bold">CodeArena</a>
        </nav>
    </header>
    <main class="flex items-center justify-center min-h-screen bg-white">
        <div class="bg-white rounded-xl shadow-lg p-8 w-full max-w-md">
            <h2 class="text-2xl font-bold mb-6 text-center text-gray-900">Registro</h2>
            <form class="flex flex-col gap-4">
                <div>
                    <label for="name" class="block text-gray-700 font-semibold mb-1">Nombre</label>
                    <input type="text" id="name" name="name" required class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-yellow-400" placeholder="Tu nombre">
                </div>
                <div>
                    <label for="email" class="block text-gray-700 font-semibold mb-1">Email</label>
                    <input type="email" id="email" name="email" required class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-yellow-400" placeholder="tucorreo@email.com">
                </div>
                <div>
                    <label for="password" class="block text-gray-700 font-semibold mb-1">Contraseña</label>
                    <input type="password" id="password" name="password" required class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-yellow-400" placeholder="********">
                </div>
                <div>
                    <label for="confirm-password" class="block text-gray-700 font-semibold mb-1">Confirmar Contraseña</label>
                    <input type="password" id="confirm-password" name="confirm-password" required class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-yellow-400" placeholder="********">
                </div>
                <button type="submit" class="bg-yellow-500 text-white font-bold py-2 rounded-lg hover:bg-yellow-600 transition">Registrarse</button>
            </form>
            <p class="mt-4 text-center text-gray-600">¿Ya tienes cuenta? <a href="login.html" class="text-yellow-500 hover:underline">Inicia sesión</a></p>
        </div>
    </main>
    <footer class="bg-gray-900 text-white text-center py-4">
        <p>&copy; 2026 CodeArena</p>
    </footer>
</body>

</html>
