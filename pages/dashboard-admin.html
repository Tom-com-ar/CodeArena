<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <title>CodeArena - Admin Panel</title>
</head>

<body class="bg-gray-100">

<!-- HEADER -->
<header class="bg-gray-900 text-white shadow-md">
    <div class="container mx-auto flex flex-col md:flex-row items-center justify-between p-4 gap-2">
        <h1 class="text-2xl font-bold">CodeArena Admin</h1>

        <div class="flex gap-2">
            <a href="../index.html" class="bg-gray-700 px-4 py-2 rounded-lg hover:bg-gray-600">
                Inicio
            </a>
            <a href="login.html" class="bg-red-500 px-4 py-2 rounded-lg hover:bg-red-600">
                Salir
            </a>
        </div>
    </div>
</header>

<!-- MAIN -->
<main class="container mx-auto p-4 md:p-8">

    <!-- FORM CREAR TORNEO -->
    <div class="bg-white rounded-xl shadow-lg p-4 md:p-6 mb-6">

        <h2 class="text-xl font-bold mb-4">Crear Torneo</h2>

        <form class="grid grid-cols-1 md:grid-cols-4 gap-3">

            <input type="text" placeholder="Nombre"
                class="border p-2 rounded-lg w-full md:col-span-2">

            <input type="date"
                class="border p-2 rounded-lg w-full">

            <input type="number" placeholder="Duración (min)"
                class="border p-2 rounded-lg w-full">

            <button class="bg-green-600 text-white p-2 rounded-lg hover:bg-green-700 md:col-span-4">
                Crear Torneo
            </button>

        </form>
    </div>

    <!-- LISTA TORNEOS -->
    <div class="bg-white rounded-xl shadow-lg p-4 md:p-6">

        <h2 class="text-xl font-bold mb-4">Torneos</h2>

        <!-- MOBILE CARDS -->
        <div class="space-y-4 md:hidden">

            <div class="border p-3 rounded-lg">
                <p class="font-bold">Torneo JS</p>
                <p class="text-sm text-gray-500">10/05/2026</p>

                <div class="flex gap-2 mt-3">
                    <button class="bg-yellow-500 px-3 py-1 rounded text-white text-sm">Editar</button>
                    <button class="bg-red-500 px-3 py-1 rounded text-white text-sm">Eliminar</button>
                </div>
            </div>

        </div>

        <!-- DESKTOP TABLE -->
        <div class="hidden md:block overflow-x-auto">

            <table class="min-w-full">

                <thead>
                    <tr class="bg-gray-50 text-left text-sm">
                        <th class="p-3">Torneo</th>
                        <th class="p-3">Fecha</th>
                        <th class="p-3">Duración</th>
                        <th class="p-3">Acciones</th>
                    </tr>
                </thead>

                <tbody>

                    <tr class="border-t">
                        <td class="p-3">Torneo JS</td>
                        <td class="p-3">10/05/2026</td>
                        <td class="p-3">120 min</td>
                        <td class="p-3 flex gap-2">
                            <button class="bg-yellow-500 px-3 py-1 rounded text-white">Editar</button>
                            <button class="bg-red-500 px-3 py-1 rounded text-white">Eliminar</button>
                        </td>
                    </tr>

                    <tr class="border-t">
                        <td class="p-3">Algoritmos</td>
                        <td class="p-3">24/05/2026</td>
                        <td class="p-3">90 min</td>
                        <td class="p-3 flex gap-2">
                            <button class="bg-yellow-500 px-3 py-1 rounded text-white">Editar</button>
                            <button class="bg-red-500 px-3 py-1 rounded text-white">Eliminar</button>
                        </td>
                    </tr>

                </tbody>

            </table>

        </div>

    </div>

</main>

</body>
</html>
