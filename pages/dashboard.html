<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <title>CodeArena - Perfil</title>
</head>


<body class="bg-gray-100">
    <header class="bg-gray-900 text-white shadow-md">
        <nav class="container mx-auto flex flex-col md:flex-row items-center justify-between p-4 gap-2">
            <a href="../index.html" class="text-2xl font-bold">CodeArena</a>
            <span class="text-sm md:text-lg text-gray-300">Panel de Usuario</span>
            <button id="logoutBtn" class="bg-yellow-500 text-white px-4 py-2 rounded-lg font-semibold hover:bg-yellow-600 transition w-full md:w-auto text-center">Cerrar sesión</button>
        </nav>
    </header>
    <main class="min-h-screen py-6 md:py-10 px-4">
        <div class="container mx-auto max-w-4xl">
            <div id="user-card"></div>
            <div class="bg-white rounded-xl shadow-lg p-4 md:p-6 mt-6">
                <h3 class="text-lg md:text-xl font-bold text-gray-900 mb-4">Torneos Disponibles</h3>
                <div id="torneos-list" class="space-y-4"></div>
            </div>
            <div class="bg-white rounded-xl shadow-lg p-4 md:p-6 mt-6">
                <h3 class="text-lg md:text-xl font-bold text-gray-900 mb-4">Torneos Inscripto</h3>
                <div id="torneos-inscripto-mobile" class="block md:hidden space-y-3"></div>
                <div class="hidden md:block overflow-x-auto">
                    <table class="min-w-full divide-y divide-gray-200">
                        <thead class="bg-gray-50">
                            <tr>
                                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Torneo</th>
                                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Fecha</th>
                                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Estado</th>
                            </tr>
                        </thead>
                        <tbody id="torneos-inscripto-table" class="bg-white divide-y divide-gray-200"></tbody>
                    </table>
                </div>
            </div>

            <!-- TORNEOS INSCRITOS -->
            <div class="bg-white rounded-xl shadow-lg p-4 md:p-6">
                <h3 class="text-lg md:text-xl font-bold text-gray-900 mb-4">Mis Torneos</h3>
                
                <!-- MOBILE CARDS -->
                <div id="enrolledTourneysMobile" class="block md:hidden space-y-3"></div>

                <!-- DESKTOP TABLE -->
                <div id="enrolledTourneysDesktop" class="hidden md:block overflow-x-auto"></div>

                <div id="noTourneys" class="text-center text-gray-600 py-8">No estás inscrito a ningún torneo aún. ¡Vuelve al inicio e inscríbete!</div>
            </div>
        </div>
    </main>
    <footer class="bg-gray-900 text-white text-center py-4 mt-8">
        <p>&copy; 2026 CodeArena</p>
    </footer>
    <script>
        const storageKey = 'codearena_current_user';
        const torneosDisponibles = [
            { nombre: 'Torneo de Algoritmos', fecha: '10/05/2026', id: 1 },
            { nombre: 'Torneo de Estructuras de Datos', fecha: '24/05/2026', id: 2 },
            { nombre: 'Torneo de Programación Competitiva', fecha: '07/06/2026', id: 3 }
        ];

        function getCurrentUser() {
            return JSON.parse(localStorage.getItem(storageKey) || 'null');
        }

        function setCurrentUser(user) {
            localStorage.setItem(storageKey, JSON.stringify(user));
        }

        function logout() {
            localStorage.removeItem(storageKey);
            window.location.href = '../index.html';
        }

        function renderUserCard(user) {
            const firstLetter = user.name ? user.name[0].toUpperCase() : 'U';
            document.getElementById('user-card').innerHTML = `
                <div class="bg-white rounded-xl shadow-lg p-4 md:p-6 mb-6 md:mb-8 flex flex-col md:flex-row items-center gap-4 md:gap-6 text-center md:text-left">
                    <div class="flex">
                        <div class="w-20 h-20 md:w-24 md:h-24 rounded-full bg-yellow-400 flex items-center justify-center text-3xl md:text-4xl font-bold text-white">
                            ${firstLetter}
                        </div>
                    </div>
                    <div>
                        <h2 class="text-xl md:text-2xl font-bold text-gray-900 mb-1">${user.name || 'Usuario'}</h2>
                        <p class="text-gray-700 text-sm md:text-base">${user.email || ''}</p>
                        <p class="text-gray-500 text-sm">Miembro desde: 2026</p>
                    </div>
                </div>
            `;
        }

        function renderTorneosDisponibles(user) {
            const container = document.getElementById('torneos-list');
            container.innerHTML = '';
            torneosDisponibles.forEach(torneo => {
                const inscripto = user.torneos && user.torneos.find(t => t.id === torneo.id);
                container.innerHTML += `
                    <div class="border rounded-lg p-4 flex flex-col md:flex-row md:items-center md:justify-between gap-2">
                        <div>
                            <p class="font-semibold">${torneo.nombre}</p>
                            <p class="text-sm text-gray-500">${torneo.fecha}</p>
                        </div>
                        <button class="${inscripto ? 'bg-gray-300 text-gray-500 cursor-not-allowed' : 'bg-yellow-500 text-white hover:bg-yellow-600'} px-4 py-2 rounded-lg font-semibold transition" ${inscripto ? 'disabled' : ''} onclick="inscribirse(${torneo.id})">
                            ${inscripto ? 'Ya inscripto' : 'Inscribirse'}
                        </button>
                    </div>
                `;
            });
        }

        function renderTorneosInscripto(user) {
            const mobile = document.getElementById('torneos-inscripto-mobile');
            const table = document.getElementById('torneos-inscripto-table');
            mobile.innerHTML = '';
            table.innerHTML = '';
            if (user.torneos && user.torneos.length > 0) {
                user.torneos.forEach(torneo => {
                    // Mobile card
                    mobile.innerHTML += `
                        <div class="border rounded-lg p-3">
                            <p class="font-semibold">${torneo.nombre}</p>
                            <p class="text-sm text-gray-500">${torneo.fecha}</p>
                            <span class="inline-block mt-2 bg-green-100 text-green-800 px-3 py-1 rounded-full text-xs font-semibold">Inscripto</span>
                        </div>
                    `;
                    // Table row
                    table.innerHTML += `
                        <tr>
                            <td class="px-6 py-4">${torneo.nombre}</td>
                            <td class="px-6 py-4">${torneo.fecha}</td>
                            <td class="px-6 py-4"><span class="bg-green-100 text-green-800 px-3 py-1 rounded-full text-xs font-semibold">Inscripto</span></td>
                        </tr>
                    `;
                });
            } else {
                mobile.innerHTML = '<p class="text-gray-500">No estás inscripto en ningún torneo.</p>';
                table.innerHTML = '<tr><td colspan="3" class="px-6 py-4 text-gray-500 text-center">No estás inscripto en ningún torneo.</td></tr>';
            }
        }

        window.inscribirse = function(torneoId) {
            let user = getCurrentUser();
            if (!user) return;
            if (!user.torneos) user.torneos = [];
            const torneo = torneosDisponibles.find(t => t.id === torneoId);
            if (!torneo) return;
            if (user.torneos.find(t => t.id === torneoId)) return;
            user.torneos.push(torneo);
            setCurrentUser(user);
            renderTorneosDisponibles(user);
            renderTorneosInscripto(user);
        }

        document.getElementById('logoutBtn').addEventListener('click', logout);

        // Inicialización
        const user = getCurrentUser();
        if (!user) {
            window.location.href = 'login.html';
        } else {
            if (!user.torneos) user.torneos = [];
            renderUserCard(user);
            renderTorneosDisponibles(user);
            renderTorneosInscripto(user);
        }
    </script>
</body>

</body>
</html>
